<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Para ti 💖</title>

  <style>
    body {
      text-align: center;
      font-family: Arial, sans-serif;
      background-color: #ffe6eb;
      padding-top: 100px;
      overflow: hidden;
    }

    .carta {
      background: #fffdf7;
      padding: 30px;
      width: 60%;
      margin: auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border-radius: 15px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      margin: 10px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .yes {
      background-color: #ff4d6d;
      color: white;
    }

    .no {
      background-color: #999;
      position: relative;
    }
  </style>
</head>

<body>

<h1 id="question">¿Te gustaría tener una relación bonita conmigo? 💖</h1>

<button class="yes" onclick="yes()">Sí 💘</button>
<button class="no">No 😒</button>

<script>
function yes() {
  document.body.innerHTML = `
    <h1>Ya sabía que dirías que sí 😍💘</h1>

    <img src="https://i.imgur.com/UVa1K5Z.jpeg"
         style="width:300px; border-radius:15px; margin:20px;">

    <br><br>

    <button onclick="mostrarCarta()">Tengo algo que decirte</button>
  `;
}

function mostrarCarta() {
  document.body.innerHTML = `
    <div class="carta">
      <h1>Para mi niña 💖</h1>
      <p>
         Estimada Isidora (la niña más hermosa del mundo)<br><br>
    Bueno, se me a ocurrido hacer esto porque es una tontera mia jeje, estos dias me he sentido super bien con usted y pues que más decirle, expresarle lo que siento 
    solo con palabras no me alcanza, se que no soy perfecto y los caminos de la vida son dificiles pero me encantaria que Dios me guie y mucho mejor si usted va junto a mi
    puede que sea muy temprano para decirle muchas cosas y mañana mismo se cumple un mes de haberle respondido esa nota que puso (no me arrepiento jeje). Hemos avanzado tan rapido 
    pero enserio mi niña he tenido una conexión tan fuerte con usted, simplemente esta hecha para mi, y como usted me trata es tan hermoso y lo valoro mucho.<br>
    Y de la forma más egoista no quiero que nadie más sepa como es estar con usted ni ha como saben sus labios porque ya me enamore hasta de la forma que me mira cuando hago mis 
    tonteras de niño chico. Hoy en día muchas personas buscan tener un momento con muchas personas pero yo quisiera tener muchos momentos junto a su persona, si hace falta le hago aseo en 
    toda la casa a la suegrita jsjsjsjs.<br>
    Es perfecta simplemente, es hermosa usted y no me lo niegue eh, cuidadito, sus ojos y su carita me enamoran, esque simplemente eres tu mi chica del sur, su pelo suelto junto al cielo azul, digo 
    muchas tonteras pero por usted grito te amo a la tierra entera. Y la verdad no me importa mandarme sendos piques para ir a verla aunque me duelan mucho las piernas porque aunque no lo crea esos 10-20 
    minutos que paso con usted me alegran la semanita entera y pues si con verla un ratito me alegra imaginese una hora wuaaaaaa, me vuelvo loco.<br>
    Gracias por haber llegado a mi vida y realmente quiero que contigo funcione sea como sea porque yo estoy dispuesto a hacer lo imposible solo por estar contigo...<br>
    Te amo mucho mi niña 🤍<br>
    Atentamente: Su niño loco de amor por usted, Adán.
      </p>
    </div>
  `;
}

// BOTÓN TROLL
const noBtn = document.querySelector(".no");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.position = "absolute";

  let x = Math.random() * (window.innerWidth - 100);
  let y = Math.random() * (window.innerHeight - 50);

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  const mensajes = [
    "¿Segura? 🤔",
    "Piénsalo bien, si yo te amo 😘",
    "No es opción válida 😤",
    "Intenta otra vez 😝",
    "MMMMMMM 🤨",
    "Muack Muack 😜"
  ];

  document.getElementById("question").innerText =
    mensajes[Math.floor(Math.random() * mensajes.length)];
});
</script>

</body>
</html>
