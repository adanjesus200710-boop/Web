<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Para ti 💘</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* MENÚ */
.menu {
  background-color: #ffe6eb;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.contenido-menu {
  text-align: center;
}

.contenido-menu h1 {
  font-size: 40px;
  color: #ff4d6d;
}

button {
  padding: 12px 20px;
  margin: 8px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

/* PREGUNTA */
.pregunta {
  background-color: #ffe6eb;
  height: 100vh;
  padding-top: 100px;
  text-align: center;
}

/* CARTA */
.carta-fondo {
  background-color: #4a90e2;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}

.carta {
  background: #fffdf7;
  padding: 50px;
  width: 70%;
  max-width: 750px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);

  clip-path: polygon(
    0% 5%, 5% 0%, 95% 0%, 100% 5%,
    100% 95%, 95% 100%, 5% 100%, 0% 95%
  );
}
</style>
</head>

<body>

<div id="contenido"></div>

<script>

let anterior = null;

// 🏠 MENÚ
function menu() {
  anterior = null;

  document.getElementById("contenido").innerHTML = `

      <div class="contenido-menu">
        <h1>Bienvenida mi niña, espero le guste 💖</h1>

        "width:300px; border-radius:15px; margin:20px;">

      <button onclick="quiz()">Cuestionario muack muack 🤔</button>
      </div>
    </div>
  `;
}

// 💘 PREGUNTA
function pregunta() {
  anterior = menu;

  document.getElementById("contenido").innerHTML = `
    <div class="pregunta">
      <h1 id="question">¿Te gustaría tener una relación bonita conmigo? 💖</h1>

      <button onclick="si()">Sí 💘</button>
      <button id="noBtn">No 😒</button>

      <br><br>
      <button onclick="volver()">⬅️ Volver</button>
      <button onclick="menu()">🏠 Menú</button>
    </div>
  `;

  const noBtn = document.getElementById("noBtn");

  noBtn.addEventListener("mouseover", () => {
    noBtn.style.position = "absolute";
    noBtn.style.top = Math.random() * window.innerHeight + "px";
    noBtn.style.left = Math.random() * window.innerWidth + "px";

    const mensajes = [
    "¿Segura? 🤔",
    "Piénsalo bien, si yo te amo 😘",
    "No es opción válida 😤",
    "Intenta otra vez 😝",
    "MMMMMMM 🤨",
    "Muack Muack 😜"
    ];

    document.getElementById("question").innerText =
      mensajes[Math.floor(Math.random() * mensajes.length)];
  });
}

// 💥 RESPUESTA SÍ
function si() {
  anterior = pregunta;

  document.getElementById("contenido").innerHTML = `
    <div class="pregunta">
      <h1>Siuuuuuuu, sabia que diria que sí💘</h1>

function quiz() {
  preguntaActual = 0;
  mostrarPregunta();
}

function mostrarPregunta() {
  let p = preguntas[preguntaActual];

  let botones = "";

  p.opciones.forEach((op, i) => {
    botones += `<button onclick="responder(${op.correcta})">${op.texto}</button><br>`;
  });

  document.getElementById("contenido").innerHTML = `
    <div class="pregunta">
      <h1>${p.pregunta}</h1>
      ${botones}

      <br>
      <button onclick="menu()">🏠 Menú</button>
    </div>
  `;
}

function siguientePregunta() {
  preguntaActual++;

  if (preguntaActual < preguntas.length) {
    mostrarPregunta();
  } else {
    finalQuiz();
  }
}

function responder(correcta) {
  if (correcta) {

    document.getElementById("contenido").innerHTML = `
      <div class="pregunta">
        <h1>Correcto 💘</h1>

        <button onclick="siguientePregunta()">Continuar ➡️</button>
        <br><br>
        <button onclick="menu()">🏠 Menú</button>
      </div>
    `;

  } else {
    let mensaje = preguntas[preguntaActual].mensajeError;

    document.getElementById("contenido").innerHTML = `
      <div class="pregunta">
        <h1>${mensaje}</h1>

        <button onclick="mostrarPregunta()">Volver a responder 🔁</button>
        <button onclick="menu()">🏠 Menú</button>
      </div>
    `;
  }
}
